name: Deploy README to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Create _quarto.yml for gh-pages
        run: |
          cat > _quarto.yml << 'EOFQMD'
          project:
            type: website
            output-dir: _site
          
          website:
            title: "README"
          
          format:
            html:
              theme: spacelab
              toc: true
              toc-depth: 4
              number-sections: false
              code-fold: true
              code-tools: true
          
          execute:
            enabled: false
          EOFQMD
          
          # Rename README.md to index.qmd for Quarto
          cp README.md index.qmd

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
