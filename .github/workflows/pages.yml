name: Deploy README to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Create index.qmd from README
        run: |
          cat > index.qmd << 'EOFQMD'
          ---
          format:
            html:
              theme: spacelab
              highlight-style: tango
              toc: true
              toc-depth: 4
              number-sections: false
              code-fold: true
              code-tools: true
              embed-resources: false
          execute:
            enabled: false
          ---
          EOFQMD
          cat README.md >> index.qmd

      - name: Render Quarto
        run: quarto render index.qmd --no-execute

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
