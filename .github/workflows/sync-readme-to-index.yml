name: Sync README to index.md for GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Generate index.md from README
        run: |
          # Extract title from first # heading in README
          TITLE=$(grep -m 1 "^# " README.md | sed 's/^# //' || echo "Documentation")
          
          # Create index.md with Jekyll front matter + README content
          cat > index.md << EOF
          ---
          layout: default
          title: $TITLE
          ---

          EOF
          cat README.md >> index.md
          
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.md
          if git diff --staged --quiet; then
            echo "No changes to index.md"
          else
            git commit -m "docs(pages): auto-sync index.md from README.md"
            git push
          fi
